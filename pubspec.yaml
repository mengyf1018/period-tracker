name: period_tracker
description: 花期记录 - 经期追踪 App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  sqflite: ^2.3.0          # 本地数据库
  path: ^1.9.0             # 数据库路径
  table_calendar: ^3.1.0   # 日历组件
  provider: ^6.1.1         # 状态管理
  intl: ^0.19.0            # 日期格式化
  fl_chart: ^0.68.0        # 图表组件
  shared_preferences: ^2.2.2  # 轻量存储

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
